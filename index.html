<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/manifest.json" />
  <title>Odds AI Analyzer</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#111; color:#f5f5f5; }
    .wrap { max-width:760px; margin:0 auto; padding:18px; }
    .card { background:#1b1b1b; border:1px solid #333; border-radius:18px; padding:16px; margin:14px 0; }
    select, button { width:100%; padding:14px; border-radius:12px; border:1px solid #444; background:#222; color:white; font-size:16px; margin:8px 0; }
    button { background:#f2f2f2; color:#111; font-weight:700; }
    .row { display:flex; gap:8px; }
    .row > * { flex:1; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#333; margin-right:5px; font-size:12px; }
    .score { font-size:28px; font-weight:800; }
    .muted { color:#aaa; font-size:13px; }
    .pick { border-top:1px solid #333; padding-top:10px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Odds AI Analyzer</h2>
    <div class="card">
      <div class="row">
        <select id="sport">
          <option value="all">전체</option>
          <option value="baseball">야구</option>
          <option value="soccer">축구</option>
        </select>
        <select id="window">
          <option value="60">경기 1시간 전</option>
          <option value="30">경기 30분 전</option>
          <option value="120">경기 2시간 전</option>
        </select>
      </div>
      <button onclick="loadData()">분석하기</button>
      <div class="muted">실제 베팅 실행 없음 · 분석/추천 전용</div>
    </div>
    <div id="result"></div>
  </div>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
const krType = { cautious:'신중형', balanced:'균형형', aggressive:'공격형' };
async function loadData(){
  const sport = document.getElementById('sport').value;
  const win = document.getElementById('window').value;
  const res = await fetch(`/api/analyze?sport=${sport}&window=${win}`);
  const data = await res.json();
  render(data);
}
function pickHtml(p){
  return `<div class="pick">
    <b>${p.home_team} vs ${p.away_team}</b><br/>
    <span class="badge">${p.sport}</span><span class="badge">${p.market}</span><span class="badge">${p.side}</span>
    <div>배당 ${p.opening_odds} → ${p.current_odds} / 점수 <b>${p.score}</b></div>
    <div class="muted">${p.reasons.join(' · ')}</div>
  </div>`;
}
function render(data){
  const combos = data.combos.map(c => `<div class="card">
    <div class="badge">${krType[c.type]}</div>
    <h3>${c.title}</h3>
    <div class="score">합산배당 ${c.combined_odds}</div>
    <div>평균점수 ${c.avg_score} · 위험도 ${c.risk_label}</div>
    <p class="muted">${c.summary}</p>
    ${c.picks.map(pickHtml).join('')}
  </div>`).join('');
  const picks = data.picks.slice(0,10).map(pickHtml).join('');
  document.getElementById('result').innerHTML = combos + `<div class="card"><h3>상위 후보</h3>${picks}</div>`;
}
loadData();
</script>
</body>
</html>
